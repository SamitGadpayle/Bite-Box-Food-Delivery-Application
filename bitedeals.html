<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bite Deals</title>
    <link rel="stylesheet" href="bitedeals.css" />
    <script
      src="https://kit.fontawesome.com/efd872f22e.js"
      crossorigin="anonymous"
    ></script>
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Playwrite+ID:wght@100..400&family=Roboto:ital,wght@0,100..900;1,100..900&family=Yuyu&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header Section-->
    <header>
      <nav>
        <div>
          <!-- Logo -->
          <!-- <h2>Bite<span style="color: red">Box</span></h2> -->
           <img src="/images/Minimalist Black Meal Box Logo.png" alt="logo" width="180px">

          <!-- Menu -->
          <ul>
            <li><a href="home.html" class="active">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="bitedeals.html">BiteDeals</a></li>
            <li><a href="cart.html">Cart<i class="fa-solid fa-cart-arrow-down"></i></a></li>
            <li><a href="login.html">Login<i class="fa-solid fa-arrow-right-from-bracket"></i></a></li>
            
          </ul>
        </div>
      </nav>
    </header>
    <!-- header section completed -->

    <!-- Start Bitedeals Section -->
    <section class="deals-page">

        <!-- hero banner -->
         <div class="deal-hero">
             <h1>BiteDeals</h1>
             <p>Save more on your favorite meals</p>
         </div>
         
         <!-- combo offers section -->
         <section class="combo-section">
            <h2 class="section-title"> Today's Combo Offer</h2>
            <div class="combo-container">

                <!-- combo-1 -->
                 <div class="combo-card">
                    <img src="/images/burger-fries-cola.jpg" alt="image">
                    <h3>Burger + Fries +Cola</h3>
                    <p>Prefect Snack Combo</p>
                    <h4><span>₹299</span>₹199</h4>
                    <button>Order Now</button>
                 </div>

                 <!-- combo-2 -->
                  <div class="combo-card">
                    <img src="/images/pizza-coke-image.png" alt="image">
                    <h3>Pizza + Cola</h3>
                    <p>Weekend Special</p>
                    <h4><span>₹399</span>₹349</h4>
                    <button>Order Now</button>
                 </div>

                 <!-- combo-3 -->
                  <div class="combo-card">
                    <img src="/images/niryani-chiken-tikka-masala-image.jpg" alt="image">
                    <h3>Biryani + Chiken Tikka Masala</h3>
                    <p>Eid Special</p>
                    <h4><span>₹449</span>₹379</h4>
                    <button>Order Now</button>
                 </div>

            </div>
         </section>

    </section>
<!-- End Bitedeals Section -->
</body>
</html>
