<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form tag</title>
    <style>
        #text-input{
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Using Form Tag</h1>
    <form>
        <label for="">Username:</label><input type="text" id="text-input" placeholder="username"><br><br>
        <label for="">Password"</label><input type="password" required placeholder="password"><br><br>
        <label for="">Email"</label><input type="email" required placeholder="email"><br><br>
        <label for="">Courses:</label>
        <label for="">Java</label><input type="checkbox">
        <label for="">C++</label><input type="checkbox">
        <label for="">Python</label><input type="checkbox">
        <label for="">Data Science</label><input type="checkbox"><br><br>
        <label for="">Gender:</label>
        <label for="">Male</label><input type="radio">
        <label for="">Female</label><input type="radio">
        <label for="">Other</label><input type="radio"><br><br>
        <input type="submit">
        <input type="reset">
        <button type="submit">Registration</button>
        <button type="submit">Click</button>
    </form>
</body>
</html>
